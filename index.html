<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Theme Switcher & Partnership Portal</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <header style="position: fixed; top: 1rem; right: 1rem; z-index: 100;">
    <button id="theme-toggle" class="theme-toggle-btn">
      <span class="btn-text">Switch to Dark Mode</span>
    </button>
  </header>

  <main>
    <section class="hero">
      <h1>Hello, World!</h1>
      <p class="subtitle">Experience the beauty of Dark and White modes.</p>
    </section>

    <section id="partnership" class="form-container">
      <h2>Partnership Inquiry</h2>
      <p>Looking to collaborate? Fill out the form below and our team will get back to you shortly.</p>
      
      <form action="https://formspree.io/f/mykbznrq" method="POST" class="business-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="company">Company Name</label>
          <input type="text" id="company" name="company" placeholder="Acme Corp" required>
        </div>

        <div class="form-group">
          <label for="email">Business Email</label>
          <input type="email" id="email" name="_replyto" placeholder="john@company.com" required>
        </div>

        <div class="form-group">
          <label for="message">Partnership Vision</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell us how we can work together..." required></textarea>
        </div>

        <!-- Formspree hidden configuration -->
        <input type="hidden" name="_subject" value="New Partnership Inquiry!">
        
        <button type="submit" class="submit-btn">Send Proposal</button>
      </form>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
